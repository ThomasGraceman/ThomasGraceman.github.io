<!-- Support for MatJax -->
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true
    }
  };
</script>
<script defer src="https://cdnjs.cloudflare.com/polyfill/v3/polyfill.min.js?features=es6"></script>
<script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" id="MathJax-script"></script>

<!-- Support for Mermaid -->
<script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({startOnLoad:true, theme:'default'});
    await mermaid.run({querySelector:'code.language-mermaid'});
</script>

<!-- New post corner notice -->
<script>
document.addEventListener('DOMContentLoaded', function () {
  var notice = document.getElementById('new-post-notice');
  if (!notice) return;

  var postId = notice.dataset.postId;
  var key = 'dismissed-post-' + postId;

  if (localStorage.getItem(key) === '1') return;

  notice.hidden = false;

  notice.querySelector('.new-post-notice__close').addEventListener('click', function () {
    localStorage.setItem(key, '1');
    notice.remove();
  });
});
</script>
